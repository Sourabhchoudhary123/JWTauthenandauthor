<body>

    <h2>Get User Data</h2>
    <button onclick="getUser()">Get User</button>

    <script>
        async function getUser() {
            const token = localStorage.getItem("token");

            const res = await fetch("https://jwtauthenandauthor-4.onrender.com/api/auth/profile", {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            fetch("https://jwtauthenandauthor-4.onrender.com/api/auth/profile", {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            })

            const data = await res.json();
            console.log(data);
        }
    </script>
